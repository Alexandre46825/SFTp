services:
  web:
    image: php:8.2-apache
    container_name: apache_web
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "oqwxFTwsXSVExZu4iv-A"
      MYSQL_DATABASE: sftp_db
      MYSQL_USER: adj
      MYSQL_PASSWORD: "EkW6h9yLIz3OSMiUaN-wf"
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  app:
    image: python:3.12-slim
    container_name: python_container
    working_dir: /app
    volumes:
      - ./python:/app
    command: sh -c "pip install fastapi==0.111.0 && python app.py"

volumes:
  db_data:
